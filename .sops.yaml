# * The "sops" CLI tool performs these actions:
#     1. Decrypts (or creates) xxxx_secrets.yaml, using the privkey at
#        ~/.config/sops/age/keys.txt.
#     2. Opens the decrypted xxxx_secrets.yaml file in an editor.
#     3. On close, encrypts xxxx_secrets.yaml using a combination of EVERY
#        pubkey listed in the .sops.yaml "key_groups" block that matches the
#        path_regex.
# * The sops.nix module performs these actions:
#     1. Looks for an SSH privkey at the location specified by
#        sops.age.sshKeyPaths.
#     2. Converts the SSH privkey into an age privkey.
#     3. Uses the age privkey to decrypt and use all secrets in secrets.yaml.
# * To add a new keypair for a machine:
#     1. Generate the SSH keypair with
#          ssh-keygen -t ed25519 -N "" -f <hostname>_ssh_privkey
#          mv <hostname>_ssh_privkey.pub <hostname>_ssh_pubkey
#     2. Use the sops CLI tool to add a new variable for
#        ssh_privkey_host_<hostname> in admin_secrets.yaml, copying the
#        generated SSH privkey.
#     3. Convert the generated SSH pubkey to an age pubkey with
#        ssh-to-age -i <hostname>_ssh_pubkey > <hostname>_age_pubkey.
#     4. Add the converted age pubkey to the "keys" dictionary in this file.
#     5. Add the pubkey to the appropriate key group in creation_rules.
#     6. Open xxxx_secrets.yaml, and save and quit (without making changes).
#        This action will induce SOPS to incorporate the new keys.

# Local "keys" dictionary defines variables (aliases) for PUBLIC KEYS only.
# Note: this variable is "local," and not used by SOPS.
keys:
  - &age_pubkey_host_userg_workstation0 age1cnryfel34a36zkaayv9a0enmaetwrp3jk2nt807af8y6v6nefejs9jp9vk
  - &age_pubkey_host_nas age1h3jge72g4mmwjyk8rw9nmt5ufhfm0at9e0qd6dxqgr3w7a57f5wq45xz0a

# Each rule in this "creation_rules" list tells SOPS which public key(s) to
# use to encrypt a specific SOPS secrets file.
# Any host in the list with a matching privkey can decrypt the secrets file.
creation_rules:
  - path_regex: secrets/admin_secrets\.yaml$
    key_groups:
      - age:
          - *age_pubkey_host_userg_workstation0
  - path_regex: secrets/server_host_secrets\.yaml$
    key_groups:
      - age:
          - *age_pubkey_host_userg_workstation0
          - *age_pubkey_host_nas
  - path_regex: secrets/shared_all_hosts_secrets\.yaml$
    key_groups:
      - age:
          - *age_pubkey_host_userg_workstation0
          - *age_pubkey_host_nas

